<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Winnest</title>
    <link rel="stylesheet" href="winnest-style.css">
</head>
<body>
    <main class="login-page">
        <section class="login-brand">
            <img src="images/winnest-logo.png" alt="Winnest logo">
        </section>

        <section class="login-content">
            <div class="language-select">
                <img src="images/login-icon/language.png" alt="">
                <span>English</span>
                <img src="images/login-icon/arrow-down.png" alt="">
            </div>

            <form class="login-form">
                <h1>Welcome Back!</h1>
                <p>Sign in to your Winnest account</p>

                <label for="email">Email Address</label>
                <div class="login-input">
                    <img src="images/login-icon/email.png" alt="">
                    <input id="email" type="email" placeholder="name@winnest.com">
                </div>

                <label for="password">Password</label>
                <div class="login-input">
                    <img src="images/login-icon/lock.png" alt="">
                    <input id="password" type="password" placeholder="Enter your password">
                    <img src="images/login-icon/eye-off.png" alt="">
                </div>

                <a href="#" class="forgot-password">Forget Password?</a>

                <label class="remember-row">
                    <input type="checkbox" checked>
                    <span>Remember me</span>
                </label>

                <button type="submit" class="login-button">Sign In</button>

                <p class="create-account">
                    Don’t have an account?
                    <a href="#">Create Account</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
